<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西游记 · 小朋友的睡前故事</title>
  <meta name="description" content="专为一年级小朋友打造的西游记连载故事，每天更新2个章节，图文并茂，好看好玩！">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐒</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Floating Clouds Background -->
  <div class="cloud-bg" aria-hidden="true">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换明暗主题" title="点我换颜色！">
    <span class="theme-icon">🌙</span>
  </button>

  <!-- Main Content -->
  <main class="container">

    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-icon" aria-hidden="true">🐒</div>
      <h1>西游记</h1>
      <p class="subtitle">小朋友的睡前故事</p>
      <p class="desc">每天晚上22:00，小猴子都会带来2个新章节哦！<br>快来看看孙悟空今天又有什么新冒险吧 ~</p>
    </header>

    <!-- Cloud Divider -->
    <div class="cloud-divider" aria-hidden="true">
      <span>☁️</span><span>⭐</span><span>☁️</span><span>⭐</span><span>☁️</span>
    </div>

    <!-- Reading Progress -->
    <section class="progress-section" id="progressSection">
      <div class="progress-header">
        <span class="progress-label">📖 阅读进度</span>
        <span class="progress-count" id="progressCount">加载中...</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
      </div>
    </section>

    <!-- Chapter List -->
    <section class="chapter-grid" id="chapterGrid">
      <!-- Populated by JS -->
    </section>

    <!-- Empty State (hidden by default) -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">📚</div>
      <h2>故事还在路上...</h2>
      <p>第一章正在快马加鞭赶来！<br>晚上22:00记得来看哦 ~</p>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
      <p>🌟 西游记 · 小朋友的睡前故事 🌟</p>
      <p class="update-info" id="updateInfo">每晚 22:00 准时更新</p>
    </footer>
  </main>

  <!-- Chapter Detail Modal -->
  <div class="modal-overlay" id="chapterModal" role="dialog" aria-modal="true" aria-label="章节详情">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="关闭">✕</button>
      <div class="modal-body" id="modalBody">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
